name: Daily Stock MA Tracker

on:
  workflow_dispatch:

  schedule:
    - cron: "30 13 * * 1-5"
      timezone: "America/Los_Angeles"

permissions:
  contents: write

concurrency:
  group: daily-stock-ma-tracker
  cancel-in-progress: false

jobs:
  run-tracker:
    name: Sync data and run strategy
    runs-on: ubuntu-24.04

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Validate configuration
        run: stock-ma-tracker validate-config

      - name: Synchronize market data
        run: stock-ma-tracker sync-data

      - name: Run buffered strategy
        run: stock-ma-tracker run

      - name: Persist market data and strategy state
        shell: bash
        run: |
          set -Eeuo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ state/

          if git diff --cached --quiet; then
            echo "No market data or state changes to commit."
            exit 0
          fi

          git commit -m "chore: update market data and strategy state"
          git push